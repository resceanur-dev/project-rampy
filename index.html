<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature-Themed Anime Background</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('pixelated-nature-scene.png'); /* Your new pixelated 8-bit nature background */
            background-size: cover;
            font-family: 'Arial', sans-serif;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }
        p {
            text-align: center;
            font-size: 1.2em;
        }
        /* Additional styling to complement nature theme */
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Pixelated Nature Scene</h1>
        <p>This is a representation of nature using pixel art elements.</p>
    </div>
</body>
</html>
