<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Rampy</title>
    <style>
        :root {
            /* Light theme variables */
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg-color: #f1f1f1;
            --border-color: #dddddd;
            --link-color: #007bff;
        }
        .dark-theme {
            /* Dark theme variables */
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg-color: #1e1e1e;
            --border-color: #444444;
            --link-color: #1e90ff;
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
        }
        .card {
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            margin: 10px;
        }
        a {
            color: var(--link-color);
        }
    </style>
</head>
<body>
    <header>
        <button id="theme-toggle" aria-pressed="false" aria-label="Toggle dark mode">Toggle Theme</button>
    </header>
    <main>
        <div class="card">
            <h1>Welcome to Project Rampy</h1>
            <p>This is a sample text.</p>
            <a href="#">This is a link</a>
        </div>
    </main>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const darkThemeClass = 'dark-theme';

        // Check for saved user preference, if any
        const userPreference = localStorage.getItem('theme');
        const systemPreference = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (userPreference === 'dark' || (userPreference === null && systemPreference)) {
            body.classList.add(darkThemeClass);
            themeToggle.setAttribute('aria-pressed', 'true');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle(darkThemeClass);
            const isDark = body.classList.contains(darkThemeClass);
            themeToggle.setAttribute('aria-pressed', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
